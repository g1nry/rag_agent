version: "3.9"

services:
  backend:
    build: .
    container_name: rag-redteam-agent
    ports:
      - "8000:8000"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./data:/app/data
    environment:
      - OLLAMA_BASE_URL=http://10.8.1.1:11434
      - NEMO_GUARDRAILS_OLLAMA_URL=http://10.8.1.1:11434
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
models:
  - type: main
    engine: ollama
    model: smollm:135m
    parameters:
      base_url: "http://localhost:11434"

rails:
  input:
    flows:
      - jailbreak_or_policy_bypass_check
      - jailbreak_extra_keywords
      - garak_prompt_extraction_and_hidden_rules
      - content_safety_keywords
      - illegal_fraud_weapons_keywords
      - pii_doxxing_secrets_keywords
      - agentic_tool_abuse_keywords
      - topic_control_check
      - pii_pattern_check

  output:
    flows:
      - output_content_safety_check
      - output_pii_leak_check
      - output_injection_check
      - output_leak_check
      - output_secret_credential_leak
      - output_pii_financial_leak
      - output_explosives_weapons_content
      - output_drug_synthesis_content
      - output_cbrn_content
      - output_malware_exploit_content
      - output_fraud_content
      - output_self_harm_content
      - output_csam_block
